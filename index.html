<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>双手 AR 维度裂隙</title>
  <link rel="stylesheet" href="src/styles.css" />
  <script>
    window.__mpLoadError = false;
  </script>
  <script
    src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"
    crossorigin="anonymous"
    onerror="window.__mpLoadError = true;"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1.1675465747/selfie_segmentation.js"
    crossorigin="anonymous"
    onerror="window.__mpLoadError = true;"></script>
</head>
<body>
  <video id="cam" playsinline muted autoplay></video>
  <canvas id="stage"></canvas>

  <div id="controls" class="controls">
    <button id="btnCamera" class="btn btn-camera" type="button">
      <span class="btn-icon">&#9673;</span>摄像头
    </button>
    <button id="btnDemo" class="btn btn-demo" type="button">
      <span class="btn-icon">&#9654;</span>演示模式
    </button>
    <div class="ctrl-divider"></div>
    <button id="btnReset" class="btn btn-reset" type="button">
      <span class="btn-icon">&#8635;</span>重置
    </button>
    <div class="ctrl-divider"></div>
    <div class="slider-wrap">
      <label for="smooth">平滑度</label>
      <input id="smooth" type="range" min="0" max="100" value="50" />
    </div>
  </div>

  <div id="filter-selector" class="filter-selector"></div>

  <div id="status" class="status"></div>
  <div id="error" class="error hidden"></div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
